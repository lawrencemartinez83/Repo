<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soccer Session & Stat Tracker</title>
    <style>
        :root {
            --primary: #2e7d32;
            --secondary: #1b5e20;
            --dark: #212121;
            --light: #f5f5f5;
            --accent: #0288d1;
            --danger: #d32f2f;
            --spreadsheet: #157f43;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: var(--light);
            color: var(--dark);
        }
        h1, h3 { text-align: center; color: var(--secondary); margin: 5px 0 15px 0; }
        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }
        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .checkbox-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            padding: 10px 0;
            font-weight: bold;
        }
        input, button {
            padding: 12px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        input[type="text"], input[type="date"], input[type="number"] { flex: 1; min-width: 0; }
        
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        
        .player-entry {
            padding: 5px 0;
            margin-bottom: 10px;
        }
        .player-header {
            font-weight: bold;
            font-size: 18px;
            color: var(--secondary);
            margin-bottom: 10px;
        }
        .time-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: #edf7ed;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .time-col {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .time-col label {
            font-size: 11px;
            font-weight: bold;
            color: var(--secondary);
        }
        
        /* Metric Sandbox Container */
        #dynamic-stat-zone {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 15px;
        }
        .stat-wrapper-row {
            display: flex;
            align-items: center;
            background: #e3f2fd;
            border: 1px solid #90caf9;
            padding: 10px;
            border-radius: 8px;
            gap: 12px;
        }
        .stat-label-title {
            font-weight: bold;
            font-size: 15px;
            flex: 2;
            color: var(--dark);
        }
        .count-num {
            font-size: 18px;
            color: var(--accent);
            font-weight: bold;
            min-width: 35px;
            text-align: center;
        }
        .plus-btn { background-color: var(--accent); padding: 8px 15px; font-size: 14px; }
        .trash-btn { background-color: var(--danger); padding: 8px 12px; font-size: 13px; }
        
        .action-row {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }
        .sms-btn { background-color: #ff9800; flex: 1; font-size: 14px; padding: 12px; }
        .email-btn { background-color: #0288d1; flex: 1; font-size: 14px; padding: 12px; }
        .master-btn { background-color: var(--spreadsheet); width: 100%; padding: 14px; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>⚽ Soccer Session Tracker</h1>

    <div class="card">
        <h3>1. Session Information</h3>
        <div class="checkbox-group">
            <label><input type="radio" name="stype" id="p-game"> Game</label>
            <label><input type="radio" name="stype" id="p-scrimmage"> Scrimmage</label>
            <label><input type="radio" name="stype" id="p-practice" checked> Practice</label>
        </div>
        <div class="form-row">
            <input type="date" id="m-date">
            <input type="text" id="m-desc" placeholder="Opponent Name / Notes">
        </div>
    </div>

    <div class="card">
        <h3>2. Custom Fields Manager</h3>
        <div class="form-row">
            <input type="text" id="custom-field-input" placeholder="Type metric (e.g. Goals, Miles Ran, Assists)">
            <button style="background-color: var(--accent);" onclick="generateMetricField()">Create Field</button>
        </div>
    </div>

    <div class="card">
        <h3>3. Active Roster Metric Panel</h3>
        <div id="roster-list">
            
            <div class="player-entry">
                <div class="player-header">⚽ Player Identity Data Configuration</div>
                <div class="form-row">
                    <input type="text" id="p1-name" placeholder="Enter Player Name" value="Striker One">
                    <input type="text" id="p1-jersey" placeholder="Jersey #" style="max-width:90px;" value="9">
                </div>
                
                <div class="time-grid">
                    <div class="time-col">
                        <label>H1 PLAYED (MINS)</label>
                        <input type="number" id="p1-h1p" value="0">
                        <label>H1 BENCH (MINS)</label>
                        <input type="number" id="p1-h1b" value="0">
                    </div>
                    <div class="time-col">
                        <label>H2 PLAYED (MINS)</label>
                        <input type="number" id="p1-h2p" value="0">
                        <label>H2 BENCH (MINS)</label>
                        <input type="number" id="p1-h2b" value="0">
                    </div>
                </div>

                <p style="font-weight: bold; margin: 5px 0; font-size: 14px; color: #555;">Tracked Performance Metrics:</p>
                <div id="dynamic-stat-zone">
                    </div>

                <div class="action-row">
                    <button class="sms-btn" onclick="shareDataLink('sms')">💬 Text Player Report</button>
                    <button class="email-btn" onclick="shareDataLink('email')">✉️ Email Player Report</button>
                </div>
            </div>

        </div>

        <button class="master-btn" onclick="extractCSV()">📊 Export Stats to Spreadsheet (CSV)</button>
    </div>

    <script>
        // Track the created fields securely in memory layout
        var assignedMetricFields = [];

        // Set standard baseline timeline
        document.getElementById('m-date').valueAsDate = new Date();

        // Safe DOM Generator to add metric line items with full error safety
        function generateMetricField() {
            var inputNode = document.getElementById('custom-field-input');
            var rawName = inputNode.value.trim();
            
            if (!rawName) {
                alert("Please type a metric field name first!");
                return;
            }

            // Clean clean string to avoid element attribute formatting errors
            var elementIdSafe = "metric-" + rawName.toLowerCase().replace(/[^a-z0-9]/g, "-");

            // Prevent duplicating identical tracker IDs
            if (assignedMetricFields.some(item => item.id === elementIdSafe)) {
                alert("This metric field already exists below!");
                return;
            }

            var fieldObject = {
                id: elementIdSafe,
                labelName: rawName
            };
            assignedMetricFields.push(fieldObject);

            var wrapperRow = document.createElement('div');
            wrapperRow.className = "stat-wrapper-row";
            wrapperRow.id = "wrap-" + elementIdSafe;

            wrapperRow.innerHTML = `
                <span class="stat-label-title">${rawName}:</span>
                <span class="count-num" id="val-${elementIdSafe}">0</span>
                <button class="plus-btn" onclick="incrementStat('${elementIdSafe}')">+1</button>
                <button class="trash-btn" onclick="destroyMetricField('${elementIdSafe}')">Delete</button>
            `;

            document.getElementById('dynamic-stat-zone').appendChild(wrapperRow);
            inputNode.value = ""; // Clear entry field box
        }

        function incrementStat(targetId) {
            var counterNode = document.getElementById("val-" + targetId);
            var parsedVal = parseInt(counterNode.innerText) || 0;
            counterNode.innerText = parsedVal + 1;
        }

        function destroyMetricField(targetId) {
            if (confirm("Are you sure you want to completely delete this metric field? All counted data for it will be removed.")) {
                var targetRowElement = document.getElementById("wrap-" + targetId);
                if (targetRowElement) {
                    targetRowElement.remove();
                }
                assignedMetricFields = assignedMetricFields.filter(item => item.id !== targetId);
            }
        }

        function getSessionType() {
            if(document.getElementById('p-game').checked) return "Game";
            if(document.getElementById('p-scrimmage').checked) return "Scrimmage";
            return "Practice";
        }

        function compileDataMessageText() {
            var name = document.getElementById('p1-name').value;
            var jrs = document.getElementById('p1-jersey').value;
            var h1p = document.getElementById('p1-h1p').value;
            var h1b = document.getElementById('p1-h1b').value;
            var h2p = document.getElementById('p1-h2p').value;
            var h2b = document.getElementById('p1-h2b').value;
            
            var date = document.getElementById('m-date').value;
            var type = getSessionType();
            var desc = document.getElementById('m-desc').value || type;

            var txt = "📊 STAT REPORT: " + desc.toUpperCase() + " (" + date + ")\n";
            txt += "Player: #" + jrs + " " + name + "\n";
            txt += "------------------------\n";
            txt += "⏱️ H1 Played/Bench: " + h1p + "m / " + h1b + "m\n";
            txt += "⏱️ H2 Played/Bench: " + h2p + "m / " + h2b + "m\n";
            txt += "------------------------\n";
            
            // Loop and compile only current live created metrics dynamically
            if (assignedMetricFields.length === 0) {
                txt += "No performance metrics recorded.";
            } else {
                assignedMetricFields.forEach(function(metric) {
                    var currentScoreValue = document.getElementById("val-" + metric.id).innerText;
                    txt += "• " + metric.labelName + ": " + currentScoreValue + "\n";
                });
            }
            return txt;
        }

        function shareDataLink(medium) {
            var msg = compileDataMessageText();
            if(medium === 'sms') {
                window.location.href = "sms:?&body=" + encodeURIComponent(msg);
            } else {
                window.location.href = "mailto:?subject=Soccer Performance Update&body=" + encodeURIComponent(msg);
            }
        }

        function extractCSV() {
            var name = document.getElementById('p1-name').value;
            var jrs = document.getElementById('p1-jersey').value;
            var h1p = document.getElementById('p1-h1p').value;
            var h1b = document.getElementById('p1-h1b').value;
            var h2p = document.getElementById('p1-h2p').value;
            var h2b = document.getElementById('p1-h2b').value;

            var date = document.getElementById('m-date').value;
            var type = getSessionType();
            var desc = document.getElementById('m-desc').value || type;

            // Header formulation line arrays
            var csvHeaders = ["Date", "Session Type", "Description", "Player Name", "Jersey #", "H1 Played", "H1 Bench", "H2 Played", "H2 Bench"];
            var csvValues = [date, type, desc, name, jrs, h1p, h1b, h2p, h2b];

            // Dynamically push the custom entries into the extraction document
            assignedMetricFields.forEach(function(metric) {
                csvHeaders.push(metric.labelName);
                csvValues.push(document.getElementById("val-" + metric.id).innerText);
            });

            var finalCsvOutputString = csvHeaders.join(",") + "\n" + csvValues.join(",");

            var blob = new Blob([finalCsvOutputString], { type: 'text/csv;charset=utf-8;' });
            var dl = document.createElement("a");
            dl.setAttribute("href", URL.createObjectURL(blob));
            dl.setAttribute("download", "soccer_metrics_" + name.toLowerCase().replace(/[^a-z0-9]/g, "_") + ".csv");
            dl.setAttribute("style", "display:none");
            document.body.appendChild(dl);
            dl.click();
            document.body.removeChild(dl);
        }
    </script>
</body>
</html>
