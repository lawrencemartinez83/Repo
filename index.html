<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soccer Session & Stat Tracker</title>
    <style>
        :root {
            --primary: #2e7d32;
            --secondary: #1b5e20;
            --dark: #212121;
            --light: #f5f5f5;
            --accent: #0288d1;
            --danger: #d32f2f;
            --spreadsheet: #157f43;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: var(--light);
            color: var(--dark);
        }
        h1, h3 { text-align: center; color: var(--secondary); margin: 5px 0 15px 0; }
        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }
        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .checkbox-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            padding: 10px 0;
            font-weight: bold;
        }
        input, button {
            padding: 12px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        input[type="text"], input[type="date"], input[type="number"] { flex: 1; min-width: 0; }
        
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        
        .player-entry {
            border-bottom: 2px solid #eee;
            padding: 15px 0;
            margin-bottom: 10px;
        }
        .player-header {
            font-weight: bold;
            font-size: 18px;
            color: var(--secondary);
            margin-bottom: 10px;
        }
        .time-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: #edf7ed;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        .time-col {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .time-col label {
            font-size: 11px;
            font-weight: bold;
            color: var(--secondary);
        }
        .stat-flex {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .stat-item {
            background: #e3f2fd;
            border: 1px solid #90caf9;
            padding: 8px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 120px;
            justify-content: space-between;
        }
        .stat-item span { font-weight: bold; font-size: 14px; }
        .count-num { font-size: 16px; color: var(--accent); font-weight: bold; min-width: 20px; text-align: center; }
        .plus-btn { background-color: var(--accent); padding: 5px 10px; font-size: 14px; }
        
        .action-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .sms-btn { background-color: #ff9800; flex: 1; font-size: 14px; padding: 10px; }
        .email-btn { background-color: #0288d1; flex: 1; font-size: 14px; padding: 10px; }
        .master-btn { background-color: var(--spreadsheet); width: 100%; padding: 14px; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>⚽ Soccer Session Tracker</h1>

    <div class="card">
        <h3>1. Session Information</h3>
        <div class="checkbox-group">
            <label><input type="radio" name="stype" id="p-game"> Game</label>
            <label><input type="radio" name="stype" id="p-scrimmage"> Scrimmage</label>
            <label><input type="radio" name="stype" id="p-practice" checked> Practice</label>
        </div>
        <div class="form-row">
            <input type="date" id="m-date">
            <input type="text" id="m-desc" placeholder="Opponent Name / Notes">
        </div>
    </div>

    <div class="card">
        <h3>2. Active Roster Metric Panel</h3>
        <div id="roster-list">
            <div class="player-entry">
                <div class="player-header">⚽ Player 1 Input Configuration</div>
                <div class="form-row">
                    <input type="text" id="p1-name" placeholder="Player Name" value="Striker One">
                    <input type="text" id="p1-jersey" placeholder="Jersey #" style="max-width:80px;" value="9">
                </div>
                <div class="time-grid">
                    <div class="time-col">
                        <label>H1 PLAYED (MINS)</label>
                        <input type="number" id="p1-h1p" value="0">
                        <label>H1 BENCH (MINS)</label>
                        <input type="number" id="p1-h1b" value="0">
                    </div>
                    <div class="time-col">
                        <label>H2 PLAYED (MINS)</label>
                        <input type="number" id="p1-h2p" value="0">
                        <label>H2 BENCH (MINS)</label>
                        <input type="number" id="p1-h2b" value="0">
                    </div>
                </div>
                <div class="stat-flex">
                    <div class="stat-item">
                        <span>Shots:</span>
                        <span class="count-num" id="p1-s1-val">0</span>
                        <button class="plus-btn" onclick="add('p1-s1-val')">+1</button>
                    </div>
                    <div class="stat-item">
                        <span>Saves:</span>
                        <span class="count-num" id="p1-s2-val">0</span>
                        <button class="plus-btn" onclick="add('p1-s2-val')">+1</button>
                    </div>
                    <div class="stat-item">
                        <span>Goals:</span>
                        <span class="count-num" id="p1-s3-val">0</span>
                        <button class="plus-btn" onclick="add('p1-s3-val')">+1</button>
                    </div>
                </div>
                <div class="action-row">
                    <button class="sms-btn" onclick="shareSingle('p1', 'sms')">💬 Text Player</button>
                    <button class="email-btn" onclick="shareSingle('p1', 'email')">✉️ Email Player</button>
                </div>
            </div>

            <div class="player-entry">
                <div class="player-header">⚽ Player 2 Input Configuration</div>
                <div class="form-row">
                    <input type="text" id="p2-name" placeholder="Player Name" value="Midfield Two">
                    <input type="text" id="p2-jersey" placeholder="Jersey #" style="max-width:80px;" value="10">
                </div>
                <div class="time-grid">
                    <div class="time-col">
                        <label>H1 PLAYED (MINS)</label>
                        <input type="number" id="p2-h1p" value="0">
                        <label>H1 BENCH (MINS)</label>
                        <input type="number" id="p2-h1b" value="0">
                    </div>
                    <div class="time-col">
                        <label>H2 PLAYED (MINS)</label>
                        <input type="number" id="p2-h2p" value="0">
                        <label>H2 BENCH (MINS)</label>
                        <input type="number" id="p2-h2b" value="0">
                    </div>
                </div>
                <div class="stat-flex">
                    <div class="stat-item">
                        <span>Shots:</span>
                        <span class="count-num" id="p2-s1-val">0</span>
                        <button class="plus-btn" onclick="add('p2-s1-val')">+1</button>
                    </div>
                    <div class="stat-item">
                        <span>Saves:</span>
                        <span class="count-num" id="p2-s2-val">0</span>
                        <button class="plus-btn" onclick="add('p2-s2-val')">+1</button>
                    </div>
                    <div class="stat-item">
                        <span>Goals:</span>
                        <span class="count-num" id="p2-s3-val">0</span>
                        <button class="plus-btn" onclick="add('p2-s3-val')">+1</button>
                    </div>
                </div>
                <div class="action-row">
                    <button class="sms-btn" onclick="shareSingle('p2', 'sms')">💬 Text Player</button>
                    <button class="email-btn" onclick="shareSingle('p2', 'email')">✉️ Email Player</button>
                </div>
            </div>

        </div>

        <button class="master-btn" onclick="extractCSV()">📊 Export Stats to Spreadsheet (CSV)</button>
        <button class="master-btn" style="background-color:#e65100;" onclick="shareSquad()">🏆 Text Full Team Summary</button>
    </div>

    <script>
        // Set standard baseline timeline
        document.getElementById('m-date').valueAsDate = new Date();

        function add(elementId) {
            var target = document.getElementById(elementId);
            var current = parseInt(target.innerText) || 0;
            target.innerText = current + 1;
        }

        function getSessionType() {
            if(document.getElementById('p-game').checked) return "Game";
            if(document.getElementById('p-scrimmage').checked) return "Scrimmage";
            return "Practice";
        }

        function buildText(prefix) {
            var name = document.getElementById(prefix + '-name').value;
            var jrs = document.getElementById(prefix + '-jersey').value;
            var h1p = document.getElementById(prefix + '-h1p').value;
            var h1b = document.getElementById(prefix + '-h1b').value;
            var h2p = document.getElementById(prefix + '-h2p').value;
            var h2b = document.getElementById(prefix + '-h2b').value;
            
            var s1 = document.getElementById(prefix + '-s1-val').innerText;
            var s2 = document.getElementById(prefix + '-s2-val').innerText;
            var s3 = document.getElementById(prefix + '-s3-val').innerText;

            var txt = "📊 STAT REPORT\n" +
                      "Player: #" + jrs + " " + name + "\n" +
                      "H1 Play/Bench: " + h1p + "/" + h1b + "m\n" +
                      "H2 Play/Bench: " + h2p + "/" + h2b + "m\n" +
                      "Shots: " + s1 + " | Saves: " + s2 + " | Goals: " + s3;
            return txt;
        }

        function shareSingle(prefix, medium) {
            var msg = buildText(prefix);
            if(medium === 'sms') {
                window.location.href = "sms:?&body=" + encodeURIComponent(msg);
            } else {
                window.location.href = "mailto:?subject=Soccer Tracking Update&body=" + encodeURIComponent(msg);
            }
        }

        function shareSquad() {
            var date = document.getElementById('m-date').value;
            var type = getSessionType();
            var desc = document.getElementById('m-desc').value || type;

            var master = "🏆 SQUAD SUMMARY: " + desc.toUpperCase() + " (" + date + ")\n\n";
            master += buildText('p1') + "\n\n----------------\n\n";
            master += buildText('p2');

            window.location.href = "sms:?&body=" + encodeURIComponent(master);
        }

        function extractCSV() {
            var date = document.getElementById('m-date').value;
            var type = getSessionType();
            var desc = document.getElementById('m-desc').value || type;

            var csv = "Date,Session Type,Description,Player,Jersey,H1 Played,H1 Bench,H2 Played,H2 Bench,Shots,Saves,Goals\n";
            
            // Player 1 line item compilation array
            csv += date + "," + type + "," + desc + "," + 
                   document.getElementById('p1-name').value + "," + document.getElementById('p1-jersey').value + "," +
                   document.getElementById('p1-h1p').value + "," + document.getElementById('p1-h1b').value + "," +
                   document.getElementById('p1-h2p').value + "," + document.getElementById('p1-h2b').value + "," +
                   document.getElementById('p1-s1-val').innerText + "," + document.getElementById('p1-s2-val').innerText + "," +
                   document.getElementById('p1-s3-val').innerText + "\n";

            // Player 2 line item compilation array
            csv += date + "," + type + "," + desc + "," + 
                   document.getElementById('p2-name').value + "," + document.getElementById('p2-jersey').value + "," +
                   document.getElementById('p2-h1p').value + "," + document.getElementById('p2-h1b').value + "," +
                   document.getElementById('p2-h2p').value + "," + document.getElementById('p2-h2b').value + "," +
                   document.getElementById('p2-s1-val').innerText + "," + document.getElementById('p2-s2-val').innerText + "," +
                   document.getElementById('p2-s3-val').innerText + "\n";

            var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            var dl = document.createElement("a");
            dl.setAttribute("href", URL.createObjectURL(blob));
            dl.setAttribute("download", "soccer_metrics.csv");
            dl.setAttribute("style", "display:none");
            document.body.appendChild(dl);
            dl.click();
            document.body.removeChild(dl);
        }
    </script>
</body>
</html>
