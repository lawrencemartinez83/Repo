<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soccer Session & Stat Tracker</title>
    <style>
        :root {
            --primary: #2e7d32;
            --secondary: #1b5e20;
            --dark: #212121;
            --light: #f5f5f5;
            --accent: #0288d1;
            --danger: #d32f2f;
            --spreadsheet: #157f43;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: var(--light);
            color: var(--dark);
        }
        h1, h3 { text-align: center; color: var(--secondary); margin: 5px 0 15px 0; }
        
        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }
        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .checkbox-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            padding: 10px 0;
            font-weight: bold;
        }
        .label-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 0;
        }
        .label-group label {
            font-size: 12px;
            font-weight: bold;
            color: var(--dark);
        }
        input, button {
            padding: 12px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            width: 100%;
        }
        input[type="text"], input[type="date"], input[type="number"] { min-width: 0; }
        
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        
        .player-entry {
            padding: 5px 0;
            margin-bottom: 10px;
        }
        .player-header {
            font-weight: bold;
            font-size: 18px;
            color: var(--secondary);
            margin-bottom: 15px;
        }
        
        /* Expanded Time Container Layout */
        .time-box-container {
            background: #edf7ed;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .half-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--secondary);
            margin: 0;
        }
        .time-row-layout {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 12px;
        }
        .time-row-layout:last-child { margin-bottom: 0; }
        
        /* 20% Dimension Expansion Rules applied directly to input wrappers */
        .mini-input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 30%; /* Expanded from 25% to provide 20% additional scaling */
        }
        .mini-input-wrapper label {
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
        }
        .mini-input-wrapper input {
            padding: 9px; /* Increased padding inside input box layers */
            font-size: 16px; /* Larger typography for cleaner interactive engagement */
            text-align: center;
        }
        
        #dynamic-stat-zone {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 15px;
        }
        .stat-wrapper-row {
            display: flex;
            align-items: center;
            background: #e3f2fd;
            border: 1px solid #90caf9;
            padding: 10px;
            border-radius: 8px;
            gap: 12px;
        }
        .stat-label-title {
            font-weight: bold;
            font-size: 15px;
            flex: 2;
            color: var(--dark);
        }
        .count-num {
            font-size: 18px;
            color: var(--accent);
            font-weight: bold;
            min-width: 35px;
            text-align: center;
        }
        .plus-btn { background-color: var(--accent); padding: 8px 15px; font-size: 14px; width: auto; }
        .trash-btn { background-color: var(--danger); padding: 8px 12px; font-size: 13px; width: auto; }
        
        .action-row {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }
        .sms-btn { background-color: #ff9800; flex: 1; font-size: 14px; padding: 12px; width: auto; }
        .email-btn { background-color: #0288d1; flex: 1; font-size: 14px; padding: 12px; width: auto; }
        .master-btn { background-color: var(--spreadsheet); width: 100%; padding: 14px; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>⚽ Soccer Session Tracker</h1>

    <div class="card">
        <h3>1. Session Information</h3>
        <div class="checkbox-group">
            <label style="display:flex; align-items:center; gap:5px;">
                <input type="radio" name="stype" id="p-game" style="width:auto;">
                <span>Game</span>
            </label>
            <label style="display:flex; align-items:center; gap:5px;">
                <input type="radio" name="stype" id="p-scrimmage" style="width:auto;">
                <span>Scrimmage</span>
            </label>
            <label style="display:flex; align-items:center; gap:5px;">
                <input type="radio" name="stype" id="p-practice" checked style="width:auto;">
                <span>Practice</span>
            </label>
        </div>
        <div class="form-row">
            <input type="date" id="m-date">
            <input type="text" id="m-desc" placeholder="Opponent Name / Notes">
        </div>
    </div>

    <div class="card">
        <h3>2. Custom Fields Manager</h3>
        <div class="form-row">
            <input type="text" id="custom-field-input" placeholder="Type metric (e.g. Goals, Miles Ran, Assists)">
            <button style="background-color: var(--accent); width:auto; white-space:nowrap;" onclick="generateMetricField()">Create Field</button>
        </div>
    </div>

    <div class="card">
        <h3>3. Active Roster Metric Panel</h3>

        <div class="player-entry">
            <div class="player-header">⚽ Player Identity Data Configuration</div>
            
            <div class="form-row">
                <div class="label-group" style="flex: 3;">
                    <label>Player Name:</label>
                    <input type="text" id="p1-name" placeholder="Enter full name" value="Striker One">
                </div>
                <div class="label-group" style="flex: 1;">
                    <label>Age:</label>
                    <input type="number" id="p1-age" placeholder="Age" value="12">
                </div>
            </div>
            
            <div class="form-row">
                <div class="label-group" style="flex: 3;">
                    <label>Player Position:</label>
                    <input type="text" id="p1-position" placeholder="e.g. Midfielder, Forward" value="Forward">
                </div>
                <div class="label-group" style="flex: 1;">
                    <label>Player Number:</label>
                    <input type="text" id="p1-jersey" placeholder="#" value="9">
                </div>
            </div>
            
            <div class="time-box-container" style="margin-top:15px;">
                <div class="time-row-layout">
                    <span class="half-title" style="min-width:90px;">1st Half:</span>
                    <div class="mini-input-wrapper">
                        <label>Played:</label>
                        <input type="number" id="p1-h1p" value="0">
                    </div>
                    <div class="mini-input-wrapper">
                        <label>Benched:</label>
                        <input type="number" id="p1-h1b" value="0">
                    </div>
                </div>
                
                <div class="time-row-layout" style="margin-top: 12px;">
                    <span class="half-title" style="min-width:90px;">2nd Half:</span>
                    <div class="mini-input-wrapper">
                        <label>Played:</label>
                        <input type="number" id="p1-h2p" value="0">
                    </div>
                    <div class="mini-input-wrapper">
                        <label>Benched:</label>
                        <input type="number" id="p1-h2b" value="0">
                    </div>
                </div>
            </div>
