<!DOCTYPE html>
<html lang="en" id="main-html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soccer Session & Stat Tracker</title>
    <style>
        :root {
            --primary: #2e7d32;
            --secondary: #1b5e20;
            --dark: #212121;
            --light: #f5f5f5;
            --accent: #0288d1;
            --danger: #d32f2f;
            --spreadsheet: #157f43;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: var(--light);
            color: var(--dark);
        }
        h1, h3 { text-align: center; color: var(--secondary); margin: 5px 0 15px 0; }
        
        /* Language Picker Row Style Layout */
        .lang-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
            background: #e0e0e0;
            padding: 8px;
            border-radius: 8px;
        }
        .lang-btn {
            padding: 6px 12px;
            font-size: 13px;
            background-color: #fff;
            color: var(--dark);
            border: 1px solid #bbb;
            width: auto;
            border-radius: 4px;
        }
        .lang-btn.active-lang {
            background-color: var(--secondary);
            color: #fff;
            border-color: var(--secondary);
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }
        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .checkbox-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            padding: 10px 0;
            font-weight: bold;
        }
        .label-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 0;
        }
        .label-group label {
            font-size: 12px;
            font-weight: bold;
            color: var(--dark);
        }
        input, button {
            padding: 12px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            width: 100%;
        }
        input[type="text"], input[type="date"], input[type="number"] { min-width: 0; }
        
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        
        .player-entry {
            padding: 5px 0;
            margin-bottom: 10px;
        }
        .player-header {
            font-weight: bold;
            font-size: 18px;
            color: var(--secondary);
            margin-bottom: 15px;
        }
        
        .time-box-container {
            background: #edf7ed;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .half-title {
            font-size: 13px;
            font-weight: bold;
            color: var(--secondary);
            margin: 0 0 8px 0;
            text-transform: uppercase;
        }
        .time-row-layout {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 8px;
        }
        .time-row-layout:last-child { margin-bottom: 0; }
        .mini-input-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            max-width: 25%;
        }
        .mini-input-wrapper label {
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
        }
        .mini-input-wrapper input {
            padding: 6px;
            font-size: 14px;
            text-align: center;
        }
        
        #dynamic-stat-zone {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 15px;
        }
        .stat-wrapper-row {
            display: flex;
            align-items: center;
            background: #e3f2fd;
            border: 1px solid #90caf9;
            padding: 10px;
            border-radius: 8px;
            gap: 12px;
        }
        .stat-label-title {
            font-weight: bold;
            font-size: 15px;
            flex: 2;
            color: var(--dark);
        }
        .count-num {
            font-size: 18px;
            color: var(--accent);
            font-weight: bold;
            min-width: 35px;
            text-align: center;
        }
        .plus-btn { background-color: var(--accent); padding: 8px 15px; font-size: 14px; width: auto; }
        .trash-btn { background-color: var(--danger); padding: 8px 12px; font-size: 13px; width: auto; }
        
        .action-row {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }
        .sms-btn { background-color: #ff9800; flex: 1; font-size: 14px; padding: 12px; width: auto; }
        .email-btn { background-color: #0288d1; flex: 1; font-size: 14px; padding: 12px; width: auto; }
        .master-btn { background-color: var(--spreadsheet); width: 100%; padding: 14px; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="lang-bar">
        <button class="lang-btn active-lang" id="btn-lang-en" onclick="translateAppTo('en')">English</button>
        <button class="lang-btn" id="btn-lang-es" onclick="translateAppTo('es')">Español</button>
        <button class="lang-btn" id="btn-lang-ar" onclick="translateAppTo('ar')">العربية</button>
        <button class="lang-btn" id="btn-lang-hi" onclick="translateAppTo('hi')">हिन्दी</button>
    </div>

    <h1 id="ui-main-title">⚽ Soccer Session Tracker</h1>

    <div class="card">
        <h3 id="ui-h3-session-info">1. Session Information</h3>
        <div class="checkbox-group">
            <label style="display:flex; align-items:center; gap:5px;"><input type="radio" name="stype" id="p-game" style="width:auto;"><span id="ui-lbl-game">Game</span></label>
            <label style="display:flex; align-items:center; gap:5px;"><input type="radio" name="stype" id="p-scrimmage" style="width:auto;"><span id="ui-lbl-scrimmage">Scrimmage</span></label>
            <label style="display:flex; align-items:center; gap:5px;"><input type="radio" name="stype" id="p-practice" checked style="width:auto;"><span id="ui-lbl-practice">Practice</span></label>
        </div>
        <div class="form-row">
            <input type="date" id="m-date">
            <input type="text" id="m-desc" placeholder="Opponent Name / Notes">
        </div>
    </div>

    <div class="card">
        <h3 id="ui-h3-custom-mgr">2. Custom Fields Manager</h3>
        <div class="form-row">
            <input type="text" id="custom-field-input" placeholder="Type metric (e.g. Goals, Miles Ran, Assists)">
            <button id="ui-btn-create-field" style="background-color: var(--accent); width:auto; white-space:nowrap;" onclick="generateMetricField()">Create Field</button>
        </div>
    </div>

    <div class="card">
        <h3 id="ui-h3-metric-panel">3. Active Roster Metric Panel</h3>
        <div id="roster-list">
            
            <div class="player-entry">
                <div class="player-header" id="ui-player-config-title">⚽ Player Identity Data Configuration</div>
                
                <div class="form-row">
                    <div class="label-group" style="flex: 3;">
                        <label id="ui-lbl-pname">Player Name:</label>
                        <input type="text" id="p1-name" placeholder="Enter full name" value="Striker One">
                    </div>
                    <div class="label-group" style="flex: 1;">
                        <label id="ui-lbl-page">Age:</label>
                        <input type="number" id="p1-age" placeholder="Age" value="12">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="label-group" style="flex: 3;">
                        <label id="ui-lbl-pposition">Player Position:</label>
                        <input type="text" id="p1-position" placeholder="e.g. Midfielder, Forward" value="Forward">
                    </div>
                    <div class="label-group" style="flex: 1;">
                        <label id="ui-lbl-pnumber">Player Number:</label>
                        <input type="text" id="p1-jersey" placeholder="#" value="9">
                    </div>
                </div>
                
                <div class="time-box-container" style="margin-top:15px;">
                    <div class="time-row-layout">
                        <span class="half-title" id="ui-title-h1" style="min-width: 90px; margin: 0;">1st Half:</span>
                        <div class="mini-input-wrapper">
                            <label id="ui-lbl-h1p">Played:</label>
                            <input type="number" id="p1-h1p" value="0">
                        </div>
                        <div class="mini-input-wrapper">
                            <label id="ui-lbl-h1b">Benched:</label>
                            <input type="number" id="p1-h1b" value="0">
                        </div>
                    </div>
                    
                    <div class="time-row-layout" style="margin-top: 10px;">
                        <span class="half-title" id="ui-title-h2" style="min-width: 90px; margin: 0;">2nd Half:</span>
                        <div class="mini-input-wrapper">
                            <label id="ui-lbl-h2p">Played:</label>
                            <input type="number" id="p1-h2p" value="0">
                        </div>
                        <div class="mini-input-wrapper">
                            <label id="ui-lbl-h2b">Benched:</label>
                            <input type="number" id="p1-h2b" value="0">
                        </div>
                    </div>
                </div>

                <p id="ui-lbl-perf-metrics" style="font-weight: bold; margin: 5px 0; font-size: 14px; color: #555;">Tracked Performance Metrics:</p>
                <div id="dynamic-stat-zone">
                    </div>

                <div class="action-row">
                    <button class="sms-btn" id="ui-btn-sms" onclick="shareDataLink('sms')">💬 Text Player Report</button>
                    <button class="email-btn" id="ui-btn-email" onclick="shareDataLink('email')">✉️ Email Player Report</button>
                </div>
            </div>

        </div>

        <button class="master-btn" id="ui-btn-csv" onclick="extractCSV()">📊 Export Stats to Spreadsheet (CSV)</button>
    </div>

        document.getElementById('m-date').valueAsDate = new Date();

        function translateAppTo(langCode) {
            activeLanguageCode = langCode;
            
            // Toggle active status UI indicators on top languages bar
            document.querySelectorAll('.lang-btn').forEach(function(btn){
                btn.classList.remove('active-lang');
            });
            document.getElementById('btn-lang-' + langCode).classList.add('active-lang');

            // Handle RTL layout adjustment context explicitly for Arabic
            var htmlNode = document.getElementById('main-html-tag');
            if(langCode === 'ar') {
                htmlNode.setAttribute('dir', 'rtl');
            } else {
                htmlNode.setAttribute('dir', 'ltr');
            }

            // Map standard static UI translations from active dictionary selection
            var localized = dictionary[langCode];
            document.getElementById('ui-main-title').innerText = localized.mainTitle;
            document.getElementById('ui-h3-session-info').innerText = localized.sessionInfo;
            document.getElementById('ui-lbl-game').innerText = localized.game;
            document.getElementById('ui-lbl-scrimmage').innerText = localized.scrimmage;
            document.getElementById('ui-lbl-practice').innerText = localized.practice;
            document.getElementById('ui-h3-custom-mgr').innerText = localized.customMgr;
            document.getElementById('ui-btn-create-field').innerText = localized.createField;
            document.getElementById('ui-h3-metric-panel').innerText = localized.metricPanel;
            document.getElementById('ui-player-config-title').innerText = localized.playerConfig;
            
            document.getElementById('ui-lbl-pname').innerText = localized.pName;
            document.getElementById('ui-lbl-page').innerText = localized.pAge;
            document.getElementById('ui-lbl-pposition').innerText = localized.pPosition;
            document.getElementById('ui-lbl-pnumber').innerText = localized.pNumber;
            
            document.getElementById('ui-title-h1').innerText = localized.h1;
            document.getElementById('ui-lbl-h1p').innerText = localized.Played;
            document.getElementById('ui-lbl-h1b').innerText = localized.Benched;
            
            document.getElementById('ui-title-h2').innerText = localized.h2;
            document.getElementById('ui-lbl-h2p').innerText = localized.Played;
            document.getElementById('ui-lbl-h2b').innerText = localized.Benched;
            
            document.getElementById('ui-lbl-perf-metrics').innerText = localized.perfMetrics;
            document.getElementById('ui-btn-sms').innerText = localized.txtPlayer;
            document.getElementById('ui-btn-email').innerText = localized.emailPlayer;
            document.getElementById('ui-btn-csv').innerText = localized.exportCsv;
            
            // Set dynamic text attributes inside fields placeholders
            document.getElementById('m-desc').setAttribute('placeholder', localized.descPlaceHolder);
            document.getElem
